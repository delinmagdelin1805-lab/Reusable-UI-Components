<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Reusable Components</title>

  <!-- CSS -->

  <link rel="stylesheet"
    href="style.css">

  <!-- Font Awesome -->

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Google Font -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link href=
"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

</head>

<body>

  <!-- Container -->

  <section class="container">

    <!-- Title -->

    <div class="header">

      <h1>
        Reusable Components
      </h1>

      <p>
        Modern reusable UI elements
        for frontend projects
      </p>

    </div>

    <!-- Buttons -->

    <div class="component-card">

      <h2>
        Buttons
      </h2>

      <div class="button-group">

        <button class="primary">
          Primary
        </button>

        <button class="secondary">
          Secondary
        </button>

        <button class="outline">
          Outline
        </button>

      </div>

    </div>

    <!-- Cards -->

    <div class="cards">

      <div class="card">

        <i class="fa-solid fa-code"></i>

        <h3>
          Clean Code
        </h3>

        <p>
          Reusable frontend
          components with
          modern UI design.
        </p>

      </div>

      <div class="card">

        <i class="fa-solid fa-mobile-screen"></i>

        <h3>
          Responsive
        </h3>

        <p>
          Components designed
          for all devices and
          screen sizes.
        </p>

      </div>

      <div class="card">

        <i class="fa-solid fa-palette"></i>

        <h3>
          Creative UI
        </h3>

        <p>
          Beautiful gradients
          and glassmorphism
          visual effects.
        </p>

      </div>

    </div>

    <!-- Input Section -->

    <div class="component-card">

      <h2>
        Input Components
      </h2>

      <div class="inputs">

        <input
          type="text"
          placeholder="Enter Name">

        <input
          type="email"
          placeholder="Enter Email">

      </div>

    </div>

  </section>

  <!-- JavaScript -->

  <script src="script.js"></script>

</body>

</html>
